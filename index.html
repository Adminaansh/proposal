<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- These meta tags create a beautiful, custom link preview card when you paste the link into WhatsApp -->
    <title>🚨 System Notice for Divya 🚨</title>
    <meta name="description" content="Dhanraj's system has encountered a critical anomaly. Click to resolve immediately.">
    <!-- Confetti Library for the ultimate grand finale -->
    <script src="https://jsdelivr.net"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #ff758c 0%, #ff7eb3 100%);
            overflow: hidden;
            position: relative;
        }

        /* Floating background decorative emojis */
        .bg-heart {
            position: absolute;
            font-size: 24px;
            opacity: 0.2;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.2; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Premium Floating Card Design */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 45px 35px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.15), inset 0 0 15px rgba(255,255,255,0.6);
            max-width: 480px;
            width: 90%;
            z-index: 10;
            transform: translateY(0);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px rgba(255, 75, 92, 0.25);
        }

        .avatar-container {
            font-size: 65px;
            margin-bottom: 15px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h2 {
            color: #d11141;
            margin-bottom: 15px;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            color: #4a4a4a;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
            font-weight: 500;
        }

        /* Button Layout & Interaction Styles */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            position: relative;
            min-height: 70px;
        }

        .btn {
            padding: 14px 40px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            box-shadow: 0 8px 25px rgba(255, 65, 108, 0.4);
        }

        .btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(255, 65, 108, 0.6);
        }

        .btn-no {
            background: #eceff1;
            color: #b0bec5;
            position: absolute;
            transition: left 0.12s ease-out, top 0.12s ease-out; /* Keeps the runaway feeling crisp and snappy */
        }

        .success-title {
            color: #2e7d32 !important;
            font-size: 28px !important;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Main Dynamic Application Window -->
    <div class="card" id="mainCard">
        <div class="avatar-container" id="displayEmoji">🕵️‍♂️</div>
        <h2 id="displayTitle">Security Access Scan</h2>
        <p id="displayMessage">System has detected a beautiful unauthorized user named <strong>Divya</strong> attempting to navigate through <strong>Dhanraj's</strong> thoughts. Run system diagnostics?</p>
        
        <div class="btn-container" id="actionArea">
            <button class="btn btn-yes" id="yesBtn" onclick="processNextState()">Yes, Proceed</button>
            <button class="btn btn-no hidden" id="noBtn">No 🚫</button>
        </div>
    </div>

    <script>
        let appState = 1;
        const mainCard = document.getElementById('mainCard');
        const displayEmoji = document.getElementById('displayEmoji');
        const displayTitle = document.getElementById('displayTitle');
        const displayMessage = document.getElementById('displayMessage');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');

        // Create random romantic floating elements continuously
        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('bg-heart');
            heart.innerText = ['❤️', '💖', '✨', '💍', '🌸'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }, 400);

        function processNextState() {
            if (appState === 1) {
                // Advance step to the ultimate query
                appState = 2;
                displayEmoji.innerHTML = "💝";
                displayTitle.innerHTML = "Fatal Heart Crash!";
                displayMessage.innerHTML = "<strong>Dhanraj's</strong> love subroutines have completely taken over the system.<br><br>Hey <strong>Divya</strong>, will you make me the happiest programmer alive and marry me?";
                yesBtn.innerHTML = "YES! 💍✨";
                
                // Shift 'Yes' leftward to leave space for the trick button setup
                yesBtn.style.transform = "translateX(-65px)";
                noBtn.classList.remove('hidden');
                
                // Default the initial position of the 'No' button safely inside the container boundaries
                noBtn.style.left = (yesBtn.offsetLeft + yesBtn.offsetWidth + 25) + 'px';
                noBtn.style.top = yesBtn.offsetTop + 'px';
                
            } else if (appState === 2) {
                // Success execution path
                executeGrandFinale();
            }
        }

        // Upgraded High-Velocity Evasive Logic for the 'No' button
        function triggerButtonEscape() {
            // Define strict safety pads away from screen view borders
            const borderPadding = 120;
            const widthLimit = window.innerWidth - borderPadding;
            const heightLimit = window.innerHeight - borderPadding;
            
            // Generate lightning-fast standalone alternative layout coordinates
            const alternateX = Math.random() * (widthLimit - borderPadding) + (borderPadding / 2);
            const alternateY = Math.random() * (heightLimit - borderPadding) + (borderPadding / 2);

            noBtn.style.position = 'fixed';
            noBtn.style.left = alternateX + 'px';
            noBtn.style.top = alternateY + 'px';
        }

        // Link event triggers for multi-device interception (Desktop + Smartphone)
        noBtn.addEventListener('mouseenter', triggerButtonEscape);
        noBtn.addEventListener('mouseover', triggerButtonEscape);
        noBtn.addEventListener('touchstart', (event) => {
            event.preventDefault(); // Deadlocks mobile multi-tap overlays completely
            triggerButtonEscape();
        });

        function executeGrandFinale() {
            noBtn.remove();
            yesBtn.style.transform = "none";
            yesBtn.classList.add('hidden');

            displayEmoji.innerHTML = "👩‍❤️‍👨";
            displayEmoji.style.animation = "bounce 0.5s infinite alternate";
            displayTitle.innerHTML = "Divya & Dhanraj: Locked Forever!";
            displayTitle.classList.add('success-title');
            displayMessage.innerHTML = "🎉 ACCESS GRANTED! 🎉<br><br>The life partner module has successfully initialized.<br><strong>I love you infinite amounts, Divya! ❤️</strong>";

            // Premium continuous celebration confetti fountain
            const duration = 7 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
