<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 Special Message for Divya 🚨</title>
    <meta name="description" content="Dhanraj has a very important question for you. Click to open!">
    <!-- Confetti Grand Finale Library -->
    <script src="https://jsdelivr.net"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #ff758c 0%, #ff7eb3 100%);
            overflow: hidden;
            position: relative;
        }

        /* Floating Romantic Heart Stickers Background */
        .bg-sticker {
            position: absolute;
            width: 45px;
            height: 45px;
            opacity: 0.25;
            pointer-events: none;
            animation: floatUpUp 7s linear infinite;
        }

        @keyframes floatUpUp {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 0.3; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-15vh) rotate(360deg); opacity: 0; }
        }

        /* Premium Glassmorphism Container Card */
        .proposal-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 255, 255, 0.6);
            padding: 40px 30px;
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            max-width: 490px;
            width: 92%;
            z-index: 10;
            transition: all 0.3s ease;
        }

        /* Main Animated Love Sticker Placement */
        .sticker-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px auto;
            display: block;
        }

        .sticker-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Highlighted Names Styles */
        .highlight-name-divya {
            color: #d11141;
            font-weight: 800;
            background: linear-gradient(120deg, rgba(255,65,108,0.15) 0%, rgba(255,65,108,0.05) 100%);
            padding: 2px 10px;
            border-radius: 8px;
        }

        .highlight-name-dhanraj {
            color: #ff4b2b;
            font-weight: 800;
        }

        h2 {
            color: #2d142c;
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: 800;
        }

        p {
            color: #333333;
            font-size: 17px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* Action Layout Buttons */
        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            position: relative;
            min-height: 75px;
        }

        .action-button {
            padding: 15px 45px;
            font-size: 19px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .yes-button {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            box-shadow: 0 8px 25px rgba(255, 65, 108, 0.4);
        }

        .yes-button:hover {
            transform: scale(1.12);
            box-shadow: 0 12px 30px rgba(255, 65, 108, 0.6);
        }

        .no-button {
            background: #e0e0e0;
            color: #757575;
            position: absolute;
            transition: left 0.1s ease-out, top 0.1s ease-out; /* Super fast evasion response */
        }

        .success-heading {
            color: #2e7d32 !important;
            font-size: 30px !important;
            margin-top: 10px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Main Dynamic Application Window -->
    <div class="proposal-card" id="cardContainer">
        <!-- Live Romantic Sticker Element -->
        <div class="sticker-container" id="stickerWrapper">
            <img src="https://giphy.com" alt="Romantic Sticker" id="mainSticker">
        </div>
        
        <h2 id="cardTitle">Hey <span class="highlight-name-divya">Divya</span>! 👋</h2>
        <p id="cardMessage">Your favorite person <span class="highlight-name-dhanraj">Dhanraj</span> has initiated a critical heart report. Click below to read the message!</p>
        
        <div class="btn-wrapper" id="buttonArea">
            <button class="action-button yes-button" id="mainYesBtn" onclick="handleButtonClick()">Open Message</button>
            <button class="action-button no-button hidden" id="mainNoBtn">No 🚫</button>
        </div>
    </div>

    <script>
        let layoutState = 1;
        const cardContainer = document.getElementById('cardContainer');
        const mainSticker = document.getElementById('mainSticker');
        const cardTitle = document.getElementById('cardTitle');
        const cardMessage = document.getElementById('cardMessage');
        const mainYesBtn = document.getElementById('mainYesBtn');
        const mainNoBtn = document.getElementById('mainNoBtn');

        // Dynamically spawn floating sticker images into the background canvas
        const backgroundStickerImages = [
            'https://giphy.com',
            'https://giphy.com'
        ];

        setInterval(() => {
            const imgSticker = document.createElement('img');
            imgSticker.classList.add('bg-sticker');
            imgSticker.src = backgroundStickerImages[Math.floor(Math.random() * backgroundStickerImages.length)];
            imgSticker.style.left = Math.random() * 95 + 'vw';
            imgSticker.style.animationDuration = (Math.random() * 3 + 5) + 's';
            imgSticker.style.width = (Math.random() * 25 + 35) + 'px';
            document.body.appendChild(imgSticker);
            setTimeout(() => imgSticker.remove(), 7500);
        }, 500);

        function handleButtonClick() {
            if (layoutState === 1) {
                // Advance page straight to the grand proposal layout
                layoutState = 2;
                
                // Swap main sticker to a sweet proposal sticker
                mainSticker.src = "https://giphy.com";
                
                cardTitle.innerHTML = "Will You Marry Me? 💍";
                cardMessage.innerHTML = "Dear <span class='highlight-name-divya'>Divya</span>, my system has been completely taken over by you. <br><br><span class='highlight-name-dhanraj'>Dhanraj</span> loves you infinite amounts. Will you make me the happiest person alive?";
                mainYesBtn.innerHTML = "YES! 😍❤️";
                
                // Position Yes button to the left side
                mainYesBtn.style.transform = "translateX(-70px)";
                mainNoBtn.classList.remove('hidden');
                
                // Initial baseline position for the escape No button
                mainNoBtn.style.left = (mainYesBtn.offsetLeft + mainYesBtn.offsetWidth + 25) + 'px';
                mainNoBtn.style.top = mainYesBtn.offsetTop + 'px';
                
            } else if (layoutState === 2) {
                // Run target marriage completion sequence
                triggerMarriageCelebration();
            }
        }

        // Advanced high-velocity runaway logic for the No button
        function runAwayFromMe() {
            const edgePadding = 130;
            const horizontalMax = window.innerWidth - edgePadding;
            const verticalMax = window.innerHeight - edgePadding;
            
            // Generate clean random layout positions anywhere across the viewport boundaries
            const targetX = Math.random() * (horizontalMax - edgePadding) + (edgePadding / 2);
            const targetY = Math.random() * (verticalMax - edgePadding) + (edgePadding / 2);

            mainNoBtn.style.position = 'fixed';
            mainNoBtn.style.left = targetX + 'px';
            mainNoBtn.style.top = targetY + 'px';
        }

        // Attach listeners for instant tracking response across desktop and mobile screens
        mainNoBtn.addEventListener('mouseenter', runAwayFromMe);
        mainNoBtn.addEventListener('mouseover', runAwayFromMe);
        mainNoBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Defends against mobile taps or accidental overlaps
            runAwayFromMe();
        });

        function triggerMarriageCelebration() {
            mainNoBtn.remove();
            mainYesBtn.style.transform = "none";
            mainYesBtn.classList.add('hidden');

            // Swap to a happy celebratory couple sticker
